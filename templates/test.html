<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Image with Icons</title>
<style>
  /* CSS for the container */
  .container {
    position: relative;
    width: 200px;
    height: 200px;
  }

  /* CSS for the image */
  .container img {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* CSS for the icons */
  .icon {
    position: absolute;
    display: none;
    width: 24px;
    height: 24px;
    line-height: 24px;
    text-align: center;
  }

  /* CSS for icon 1 */
  .icon.icon-1 {
    background-color: rgba(255, 0, 0, 0.5);
    bottom: 5px;
    left: 5px;
  }

  /* CSS for icon 2 */
  .icon.icon-2 {
    background-color: rgba(0, 0, 255, 0.5);
    bottom: 5px;
    right: 5px;
  }
</style>
</head>
<body>

<div class="container" id="imageContainer">
  <img src="images/jobs.png" alt="Image">
  <div class="icon icon-1"><img src="images/fav.png" alt="like"></div>
  <div class="icon icon-2"><img src="images/dislike.png" alt="dislike"></div>
</div>

<script>
  let currentImageIndex = 1;
  const images = ['fav.png', 'fav-out.png']; // Add more image URLs as needed
  const container = document.getElementById('imageContainer');
  const icons = container.querySelectorAll('.icon');

  // JavaScript for hover effect
  const container = document.getElementById('imageContainer');
  const icons = container.querySelectorAll('.icon');

  container.addEventListener('mouseenter', function() {
    icons.forEach(icon => {
      icon.style.display = 'block';
    });
  });

  container.addEventListener('mouseleave', function() {
    icons.forEach(icon => {
      icon.style.display = 'none';
    });
  });


  function toggleImage() {
    currentImageIndex = (currentImageIndex + 1) % images.length;
    container.querySelector('img').src = images[currentImageIndex];
  }
</script>

</body>
</html>
