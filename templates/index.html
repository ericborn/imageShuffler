<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Image Display</title>
<style>
.switch {
  position: relative;
  display: inline-block;
  top: 10px;
  right: 15px;
  width: 45px;
  height: 25px;
  float: right;
}

.switch input { 
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #212C30;
  -webkit-transition: .4s;
  transition: .4s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 19px;
  width: 19px;
  left: 3px;
  bottom: 3px;
  background-color: #333B33;
  -webkit-transition: .4s;
  transition: .4s;
}

input:checked + .slider {
  background-color: #505059;
}

input:focus + .slider {
  box-shadow: 0 0 1px #9DCFE8;
}

input:checked + .slider:before {
  -webkit-transform: translateX(19px);
  -ms-transform: translateX(19px);
  transform: translateX(19px);
}

/* Rounded sliders */
.slider.round {
  border-radius: 25px;
}

.slider.round:before {
  border-radius: 50%;
}

/* Image container with hover effects */
.image-wrapper {
  position: relative;
  display: inline-block;
  margin: 5px;
  float: left;
}

.image-wrapper img {
  height: 355px;
  width: 355px;
  display: block;
}

/* Overlay for icons */
.image-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  top: 0;
  background: rgba(0, 0, 0, 0);
  transition: background 0.3s ease;
  opacity: 0;
  pointer-events: none;
}

.image-wrapper:hover .image-overlay {
  opacity: 1;
  background: rgba(0, 0, 0, 0.3);
  pointer-events: auto;
}

.icon-button {
  position: absolute;
  bottom: 10px;
  width: 50px;
  height: 50px;
  cursor: pointer;
  border: none;
  background: rgba(255, 255, 255, 0.8);
  border-radius: 50%;
  padding: 8px;
  transition: transform 0.2s ease;
  pointer-events: auto;
}

.icon-button:hover {
  transform: scale(1.1);
}

.icon-button img {
  width: 100%;
  height: 100%;
  display: block;
  pointer-events: none;
}

.heart-icon {
  left: 10px;
}

.trash-icon {
  right: 10px;
}

/* Favorite indicator */
.heart-icon.favorited {
  background: rgba(255, 50, 50, 0.9);
}
</style>
</head>
<body style="background-color: #263238;">
    <div class="col-md-3"></div>
    <div class="col-md-6 well">
        <div id="imageContainer"></div>
        <label class="switch">
            <input type="checkbox" id="onOff" checked/>
            <span class="slider round"></span>
        </label>
    </div>
<script>

// Track current images and their paths
let currentImages = [];
let intervalID;
let isIntervalRunning = true;

// Function to fetch and refresh the image list from the server
function refreshImages() {
    fetch('/get_images')
        .then(response => response.json())
        .then(data => {
          const imageContainer = document.getElementById('imageContainer');
          imageContainer.innerHTML = '';
          currentImages = data.images;

            data.images.forEach(imagePath => {
                const wrapper = document.createElement('div');
                wrapper.className = 'image-wrapper';
                
                // Create image element
                const imgElement = document.createElement('img');
                imgElement.src = `/static/${imagePath}`;
                imgElement.alt = 'Dynamic Image';
                
                // Create overlay for icons
                const overlay = document.createElement('div');
                overlay.className = 'image-overlay';
                
                // Heart button (favorite)
                const heartBtn = document.createElement('button');
                heartBtn.className = 'icon-button heart-icon';
                if (data.favorites[imagePath]) {
                    heartBtn.classList.add('favorited');
                }
                heartBtn.innerHTML = '<img src="/static/heart.png" alt="Favorite">';
                heartBtn.onclick = function(e) {
                    e.stopPropagation();
                    toggleFavorite(imagePath, heartBtn);
                };
                
                // Trash button (delete)
                const trashBtn = document.createElement('button');
                trashBtn.className = 'icon-button trash-icon';
                trashBtn.innerHTML = '<img src="/static/trash.png" alt="Delete">';
                trashBtn.onclick = function(e) {
                    e.stopPropagation();
                    deleteImage(imagePath, wrapper);
                };
                
                overlay.appendChild(heartBtn);
                overlay.appendChild(trashBtn);
                wrapper.appendChild(imgElement);
                wrapper.appendChild(overlay);
                imageContainer.appendChild(wrapper);
            });
        })
        .catch(error => console.error('Error fetching images:', error));
}

// Toggle favorite status
function toggleFavorite(imagePath, buttonElement) {
    fetch('/toggle_favorite', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ image_path: imagePath })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            if (data.favorited) {
                buttonElement.classList.add('favorited');
            } else {
                buttonElement.classList.remove('favorited');
            }
        }
    })
    .catch(error => console.error('Error toggling favorite:', error));
}

// Delete image
function deleteImage(imagePath, wrapperElement) {
    if (!confirm('Are you sure you want to delete this image?')) {
        return;
    }
    
    fetch('/delete_image', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ image_path: imagePath })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Remove the image from the DOM
            wrapperElement.remove();
            // Remove from currentImages array
            const index = currentImages.indexOf(imagePath);
            if (index > -1) {
                currentImages.splice(index, 1);
            }
        }
    })
    .catch(error => console.error('Error deleting image:', error));
}

// Initial load of images
refreshImages();

function startInterval() {
  if (intervalID) {
      clearInterval(intervalID);
  }
  intervalID = setInterval(refreshImages, 30000);
  isIntervalRunning = true;
}

function stopInterval() {
  if (intervalID) {
      clearInterval(intervalID);
      intervalID = null;
  }
  isIntervalRunning = false;
}

function toggleInterval() {
  if (isIntervalRunning) {
      stopInterval();
  } else {
      startInterval();
  }
}

// Initialize everything when page loads
document.addEventListener('DOMContentLoaded', function() {
    // Initial load of images
    refreshImages();
    
    // Start the interval
    startInterval();
    
    // Set up the toggle button
    document.getElementById('onOff').addEventListener('click', toggleInterval);
});
</script>
</body>
</html>
